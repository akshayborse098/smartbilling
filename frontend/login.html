<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProStock - Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #206f8f;
            --primary-light: #2c8fb0;
            --secondary: #eef3f8;
            --text-dark: #1a3b4f;
            --text-light: #5a7a8a;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px rgba(0, 50, 80, 0.1);
            --danger: #e74c3c;
            --success: #28a745;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #d4e6f1 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background elements */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }

        .bg-circle-1 {
            width: 400px;
            height: 400px;
            background: rgba(44, 143, 176, 0.25);
            top: -100px;
            right: -100px;
        }

        .bg-circle-2 {
            width: 300px;
            height: 300px;
            background: rgba(148, 163, 176, 0.4);
            bottom: -50px;
            left: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1);
            }

            100% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 40px 32px;
            position: relative;
            z-index: 1;
            overflow: hidden;
            transition: height 0.3s ease;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-section i {
            font-size: 2.8rem;
            color: var(--primary);
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-section h1 {
            font-size: 1.6rem;
            color: var(--text-dark);
            font-weight: 700;
        }

        .logo-section p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        /* Toggle tabs */
        .auth-tabs {
            display: flex;
            background: var(--secondary);
            border-radius: 12px;
            margin-bottom: 24px;
            padding: 4px;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            z-index: 2;
            transition: color 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary);
        }

        .tab-slider {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease;
            z-index: 1;
        }

        /* Forms */
        .form-section {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-dark);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8da4b0;
            transition: color 0.3s ease;
        }

        .input-wrapper .toggle-password {
            left: auto;
            right: 14px;
            cursor: pointer;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 2px solid #e1eaf0;
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-dark);
            transition: all 0.3s ease;
            background: white;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(44, 143, 176, 0.1);
        }

        .input-group input:focus+i {
            color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(105deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(32, 111, 143, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(32, 111, 143, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        /* ===== CUSTOM MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 40, 60, 0.55);
            backdrop-filter: blur(6px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-box {
            background: white;
            border-radius: 24px;
            padding: 2rem 2rem 1.6rem;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0, 55, 80, 0.22);
            transform: scale(0.88) translateY(20px);
            transition: transform 0.28s cubic-bezier(.34, 1.56, .64, 1), opacity 0.25s ease;
            opacity: 0;
            text-align: center;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-icon {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin: 0 auto 1rem;
        }

        .modal-icon.success {
            background: #e6f9ee;
            color: #28a745;
        }

        .modal-icon.danger {
            background: #fdecea;
            color: #d32f2f;
        }

        .modal-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #1a3b4f;
            margin-bottom: 0.5rem;
        }

        .modal-msg {
            font-size: 0.88rem;
            color: #5a7a8a;
            line-height: 1.6;
            margin-bottom: 1.4rem;
        }

        .modal-btn {
            width: 100%;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            color: white;
            background: linear-gradient(105deg, var(--primary), var(--primary-light));
        }

        .modal-btn.danger {
            background: linear-gradient(105deg, var(--danger), #c0392b);
        }
    </style>
</head>

<body>

    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>

    <div class="auth-container">
        <div class="logo-section">
            <i class="fas fa-box-open"></i>
            <h1>SmartBilling</h1>
            <p>Wholesale Management</p>
        </div>

        <div class="auth-tabs">
            <div class="tab-slider" id="tabSlider"></div>
            <button class="tab-btn active" id="btnShowLogin" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" id="btnShowSignup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm" class="form-section active">
            <div class="input-group">
                <label>Email or Phone Number</label>
                <div class="input-wrapper">
                    <input type="text" id="loginId" placeholder="Enter email or phone">
                    <i class="fas fa-user"></i>
                </div>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="loginPass" placeholder="Enter password">
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-eye toggle-password" onclick="togglePass('loginPass', this)"></i>
                </div>
            </div>
            <button class="submit-btn" onclick="handleLogin()">Login to Dashboard <i class="fas fa-arrow-right"
                    style="margin-left:5px;"></i></button>
            <div id="loginError" class="error-msg">Invalid credentials.</div>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" class="form-section">
            <div class="input-group">
                <label>Shop Name</label>
                <div class="input-wrapper">
                    <input type="text" id="signupShop" placeholder="Shop Name">
                    <i class="fas fa-store"></i>
                </div>
            </div>
            <div class="input-group">
                <label>Email or Phone Number</label>
                <div class="input-wrapper">
                    <input type="text" id="signupId" placeholder="Enter email or phone">
                    <i class="fas fa-envelope"></i>
                </div>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" id="signupPass" placeholder="Create password">
                    <i class="fas fa-lock"></i>
                    <i class="fas fa-eye toggle-password" onclick="togglePass('signupPass', this)"></i>
                </div>
            </div>
            <button class="submit-btn" onclick="handleSignup()">Create Account <i class="fas fa-user-plus"
                    style="margin-left:5px;"></i></button>
            <div id="signupError" class="error-msg">Please fill all fields.</div>
        </div>
    </div>

    <!-- CUSTOM MODAL -->
    <div class="modal-overlay" id="customModal">
        <div class="modal-box">
            <div class="modal-icon" id="modalIcon"><i id="modalIconI" class="fas fa-info-circle"></i></div>
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-msg" id="modalMsg"></div>
            <div class="modal-actions" id="modalActions"></div>
        </div>
    </div>

    <script>
        // Tab switching logic
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const slider = document.getElementById('tabSlider');
            const btnLogin = document.getElementById('btnShowLogin');
            const btnSignup = document.getElementById('btnShowSignup');

            document.getElementById('loginError').style.display = 'none';
            document.getElementById('signupError').style.display = 'none';

            if (tab === 'login') {
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
                slider.style.transform = 'translateX(0)';
                btnLogin.classList.add('active');
                btnSignup.classList.remove('active');
            } else {
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
                slider.style.transform = 'translateX(100%)';
                btnSignup.classList.add('active');
                btnLogin.classList.remove('active');
            }
        }

        // Show/Hide password toggle
        function togglePass(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                iconElement.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                iconElement.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // ===== CUSTOM MODAL HELPERS =====
        const _modal = document.getElementById("customModal");
        const _modalIcon = document.getElementById("modalIcon");
        const _modalIconI = document.getElementById("modalIconI");
        function showModal(type, title, msg, onOk) {
            _modalIcon.className = "modal-icon " + type;
            _modalIconI.className = type === 'success' ? "fas fa-check-circle" : "fas fa-times-circle";
            document.getElementById("modalTitle").textContent = title;
            document.getElementById("modalMsg").textContent = msg;

            const actions = document.getElementById("modalActions");
            actions.innerHTML = "";
            const b = document.createElement("button");
            b.className = "modal-btn" + (type === 'danger' ? " danger" : "");
            b.textContent = "OK";
            b.onclick = () => { _modal.classList.remove("active"); if (onOk) onOk(); };
            actions.appendChild(b);
            _modal.classList.add("active");
        }

        // Change this URL to your deployed backend URL before deploying the frontend
        const DEPLOYED_BACKEND_URL = "https://your-backend-project.vercel.app";
        const API_URL = window.location.hostname === 'localhost' || window.location.protocol === 'file:' 
            ? 'http://localhost:5000/api' 
            : `${DEPLOYED_BACKEND_URL}/api`;

        // Authentication logic
        async function handleSignup() {
            const shop = document.getElementById('signupShop').value.trim();
            const id = document.getElementById('signupId').value.trim();
            const pass = document.getElementById('signupPass').value.trim();
            const err = document.getElementById('signupError');

            if (!shop || !id || !pass) {
                err.textContent = "Please fill all fields.";
                err.style.display = "block";
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: shop, email: id, password: pass })
                });

                const data = await response.json();

                if (response.ok) {
                    err.style.display = "none";
                    showModal('success', 'Account Created!', `Welcome to ProStock, ${shop}. You can now login.`, () => {
                        document.getElementById('loginId').value = id;
                        document.getElementById('signupShop').value = "";
                        document.getElementById('signupId').value = "";
                        document.getElementById('signupPass').value = "";
                        switchTab('login');
                    });
                } else {
                    err.textContent = data.message || "Signup failed.";
                    err.style.display = "block";
                }
            } catch (error) {
                err.textContent = "Server connection error.";
                err.style.display = "block";
            }
        }

        async function handleLogin() {
            const id = document.getElementById('loginId').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const err = document.getElementById('loginError');

            if (!id || !pass) {
                err.textContent = "Please enter both ID and password.";
                err.style.display = "block";
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: id, password: pass })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem("prostock_username", data.user.name);
                    localStorage.setItem("prostock_userid", data.user.id);
                    localStorage.setItem("prostock_token", data.token);

                    showModal('success', 'Login Successful', `Redirecting to your dashboard...`, () => {
                        window.location.href = "chay.html";
                    });
                } else {
                    showModal('danger', 'Login Failed', data.message || 'Invalid credentials. Please try again.');
                }
            } catch (error) {
                showModal('danger', 'Error', 'Cannot connect to the server. Please ensure the backend is running.');
            }
        }

        // Allow enter key submission
        document.getElementById('loginPass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
        document.getElementById('signupPass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleSignup();
        });
    </script>
</body>

</html>
